<!DOCTYPE html>
<html lang="en-US">
<head>
    <base href="https://rawcdn.githack.com/genizy/google-class/main/gdlite/">
    <title>Geometry Dash</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/png" href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">
    <link rel="stylesheet" href="themes/geometrydashlite.io/rs/css/home.css?v=1">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgb(0,0,0), rgb(0,102,255));
            overflow: hidden;
        }

        #passwordGate {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: linear-gradient(rgb(0,0,0), rgb(0,102,255));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #passwordBox {
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 12px;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            width: 300px;
        }

        #fakeInput {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        #passwordBox button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }

        #errorText {
            color: red;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

<!-- Autofill poison -->
<input type="text" style="position:absolute;opacity:0;height:0;width:0" autocomplete="username">
<input type="password" style="position:absolute;opacity:0;height:0;width:0" autocomplete="new-password">

<div id="passwordGate">
    <div id="passwordBox">
        <h2>Enter Password</h2>

        <!-- NOT a password input -->
        <input
            type="text"
            id="fakeInput"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            placeholder="Password"
        >

        <button onclick="checkPassword()">Enter</button>
        <p id="errorText">Wrong password</p>
    </div>
</div>

<div id="gameContainer"></div>

<script>
    const REAL_PASSWORD = "RomanIsWeak";
    let buffer = "";

    const input = document.getElementById("fakeInput");

    input.addEventListener("input", () => {
        buffer += input.value.slice(-1);
        input.value = "•".repeat(buffer.length);
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace") {
            buffer = buffer.slice(0, -1);
            input.value = "•".repeat(buffer.length);
        }
    });

    function checkPassword() {
        if (buffer === REAL_PASSWORD) {
            buffer = "";
            document.getElementById("passwordGate").remove();
            loadGame();
        } else {
            buffer = "";
            input.value = "";
            document.getElementById("errorText").style.display = "block";
        }
    }

    function loadGame() {
        const unityScript = document.createElement("script");
        unityScript.src = "Build/UnityLoader.js";
        unityScript.onload = () => {
            UnityLoader.instantiate(
                "gameContainer",
                "Build/GeometryDashLite.json"
            );
        };
        document.body.appendChild(unityScript);
    }
</script>

</body>
</html>
