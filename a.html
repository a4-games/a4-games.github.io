<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Countdown</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: monospace;
      text-align: center;
    }

    #countdown {
      font-size: clamp(1.2rem, 4vw, 3rem);
      padding: 1rem;
      max-width: 90%;
      word-wrap: break-word;
    }
  </style>
</head>
<body>

  <div id="countdown"></div>

  <script>
    const endMessage =
      "FIELD NOT FILLED. HAVE SOME RESPECT AND STOP SNOOPING AROUND THE HTML. IF YOU SPOIL THIS I'M NOT DOING ANOTHER.";

    const targetDate = new Date("2027-01-01T00:00:00");
    const countdownEl = document.getElementById("countdown");

    function updateCountdown() {
      const now = new Date();
      let diff = targetDate - now;

      if (diff <= 0) {
        countdownEl.textContent = endMessage;
        clearInterval(timer);
        return;
      }

      const seconds = Math.floor(diff / 1000) % 60;
      const minutes = Math.floor(diff / (1000 * 60)) % 60;
      const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      countdownEl.textContent =
        `${days}:${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    const timer = setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>

</body>
</html>
