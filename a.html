<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>THE SHOW</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

#lock {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  cursor: pointer;
  z-index: 10;
  text-align: center;
}

#countdown {
  font-size: 5rem;
  letter-spacing: 0.1em;
  transition: opacity 1s ease;
}

#messagePopup {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 2rem;
  color: white;
  background: rgba(0,0,0,0.85);
  opacity: 0;
  pointer-events: none;
  transition: opacity 1s ease;
}
</style>
</head>
<body>
<div id="lock">
  Click to arm audio<br>
  <span style="font-size:1rem;opacity:.6">(Required)</span>
</div>
<div id="countdown">--:--:--</div>
<div id="messagePopup">LET US MAKE THIS YEAR BETTER THAN THE LAST, SHALL WE NOT?</div>
<script>
document.title = "THE SHOW"; // LOCK TITLE
const TARGET_HOUR = 0;   // midnight
const TARGET_MIN = 0;
const TARGET_SEC = 0;
const lock = document.getElementById("lock");
const countdownEl = document.getElementById("countdown");
const messagePopup = document.getElementById("messagePopup");
let armed = false;
lock.addEventListener("click", () => {
  armed = true;
  lock.style.display = "none";
});
function getNextMidnight() {
  let now = new Date();
  let next = new Date(now.getFullYear(), now.getMonth(), now.getDate(), TARGET_HOUR, TARGET_MIN, TARGET_SEC, 0);
  if (now >= next) next.setDate(next.getDate() + 1);
  return next;
}
let targetTime = getNextMidnight();

function fmt(sec) {
  sec = Math.max(0, Math.ceil(sec));
  const h = Math.floor(sec / 3600);
  const m = Math.floor(sec / 60) % 60;
  const s = sec % 60;
  return `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
}
function update() {
  document.title = "THE SHOW"; 
  if (!armed) return;

  const now = new Date();
  const diff = (targetTime - now)/1000; 

  if (diff <= 0) {
    countdownEl.textContent = "00:00:00";

    setTimeout(() => {
      countdownEl.style.opacity = 0;
    }, 5000);
    setTimeout(() => {
      messagePopup.style.opacity = 1;
      messagePopup.style.pointerEvents = "auto";
    }, 10000);

    return;
  }
  countdownEl.textContent = fmt(diff);
}
setInterval(update, 100);
update();
</script>
</nody>
</html>
