<!DOCTYPE html>
<html lang="en-US">
<head>
    <base href="https://rawcdn.githack.com/genizy/google-class/main/gdlite/">
    <title>Geometry Dash</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/png" href="https://e3334afd.cf-nate.pages.dev/0/g/geodash/game/splash.png">
    <link rel="stylesheet" href="themes/geometrydashlite.io/rs/css/home.css?v=1">

    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgb(0,0,0), rgb(0,102,255));
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* PASSWORD GATE */
        #passwordGate {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: linear-gradient(rgb(0,0,0), rgb(0,102,255));
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #passwordBox {
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 12px;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            width: 300px;
        }

        #passwordBox input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-top: 10px;
        }

        #passwordBox button {
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }

        #errorText {
            color: red;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="passwordGate">
    <div id="passwordBox">
        <h2>Enter Password</h2>

        <!-- autocomplete OFF prevents saving -->
        <input
            type="password"
            id="passwordInput"
            placeholder="Password"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
        >

        <button onclick="checkPassword()">Enter</button>
        <p id="errorText">Wrong password</p>
    </div>
</div>

<!-- GAME -->
<div id="gameContainer"></div>

<script>
    function checkPassword() {
        const input = document.getElementById("passwordInput");
        const pass = input.value;

        if (pass === "A4GAMESONTOP") {
            // Clear password from memory immediately
            input.value = "";
            document.getElementById("passwordGate").remove();
            loadGame();
        } else {
            document.getElementById("errorText").style.display = "block";
            input.value = "";
        }
    }

    function loadGame() {
        const unityScript = document.createElement("script");
        unityScript.src = "Build/UnityLoader.js";
        unityScript.onload = () => {
            window.gameInstance = UnityLoader.instantiate(
                "gameContainer",
                "Build/GeometryDashLite.json",
                { onProgress: UnityProgress }
            );
        };
        document.body.appendChild(unityScript);
    }

    function UnityProgress(gameInstance, progress) {
        if (progress === 1) {
            console.log("Game loaded");
        }
    }
</script>

</body>
</html>
