<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SECOND SHOW</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      text-align: center;
    }

    #countdown {
      font-size: clamp(1.2rem, 4vw, 3rem);
      padding: 1rem;
      max-width: 90%;
      word-wrap: break-word;
      transition: font-family 0.2s linear;
    }
  </style>
</head>
<body>

  <div id="countdown"></div>

  <script>
    const endMessage =
      "FIELD NOT FILLED. HAVE SOME RESPECT AND STOP SNOOPING AROUND THE HTML. IF YOU SPOIL THIS I'M NOT DOING ANOTHER.";

    const targetDate = new Date("2027-01-01T00:00:00");
    const countdownEl = document.getElementById("countdown");

    const fonts = [
      "monospace",
      "serif",
      "sans-serif",
      "cursive",
      "fantasy",
      "system-ui",
      "ui-monospace",
      "ui-serif",
      "ui-sans-serif",
      "Segoe UI",
      "Arial",
      "Arial Black",
      "Verdana",
      "Tahoma",
      "Trebuchet MS",
      "Georgia",
      "Times New Roman",
      "Palatino Linotype",
      "Book Antiqua",
      "Courier New",
      "Lucida Console",
      "Lucida Sans Unicode",
      "Impact",
      "Comic Sans MS"
    ];

    let lastFont = null;

    function getNextFont() {
      let nextFont;
      do {
        nextFont = fonts[Math.floor(Math.random() * fonts.length)];
      } while (nextFont === lastFont);

      lastFont = nextFont;
      return nextFont;
    }

    function updateCountdown() {
      const now = new Date();
      let diff = targetDate - now;

      if (diff <= 0) {
        countdownEl.textContent = endMessage;
        clearInterval(timer);
        clearInterval(fontTimer);
        return;
      }

      const seconds = Math.floor(diff / 1000) % 60;
      const minutes = Math.floor(diff / (1000 * 60)) % 60;
      const hours = Math.floor(diff / (1000 * 60 * 60)) % 24;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));

      countdownEl.textContent =
        `${days}:${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function changeFont() {
      countdownEl.style.fontFamily = getNextFont();
    }

    const timer = setInterval(updateCountdown, 1000);
    const fontTimer = setInterval(changeFont, 1000);

    updateCountdown();
    changeFont();
  </script>

</body>
</html>
